<script>
(function() {
    const totalFrames = 180;
    let frameIndex = 0;
    let isPlaying = false;
    let playTimer = null;
    let frameDelayMs = 60;
    const minDelayMs = 20;
    const maxDelayMs = 300;

    function getPlotDiv() {
        return document.querySelector('.plotly-graph-div');
    }

    function gotoFrame(nextIndex) {
        const gd = getPlotDiv();
        if (!gd) return;
        frameIndex = Math.max(0, Math.min(totalFrames - 1, nextIndex));
        Plotly.animate(
            gd,
            [String(frameIndex)],
            { frame: { duration: 0, redraw: true }, mode: 'immediate', transition: { duration: 0 } }
        );
    }

    function stopPlay() {
        isPlaying = false;
        if (playTimer) {
            clearInterval(playTimer);
            playTimer = null;
        }
    }

    function clampFrameDelay() {
        frameDelayMs = Math.max(minDelayMs, Math.min(maxDelayMs, frameDelayMs));
    }

    function startPlay() {
        stopPlay();
        clampFrameDelay();
        isPlaying = true;
        playTimer = setInterval(function() {
            if (frameIndex >= totalFrames - 1) {
                stopPlay();
                return;
            }
            gotoFrame(frameIndex + 1);
        }, frameDelayMs);
    }

    function restartIfPlaying() {
        if (isPlaying) {
            startPlay();
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.target && ['INPUT', 'TEXTAREA'].includes(event.target.tagName)) return;
        if (event.key === 'ArrowRight' || event.key === 'd' || event.key === 'D') {
            event.preventDefault();
            stopPlay();
            gotoFrame(frameIndex + 1);
            return;
        }
        if (event.key === 'ArrowLeft' || event.key === 'a' || event.key === 'A') {
            event.preventDefault();
            stopPlay();
            gotoFrame(frameIndex - 1);
            return;
        }
        if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') {
            event.preventDefault();
            frameDelayMs = Math.max(minDelayMs, Math.round(frameDelayMs * 0.8));
            restartIfPlaying();
            return;
        }
        if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') {
            event.preventDefault();
            frameDelayMs = Math.min(maxDelayMs, Math.round(frameDelayMs * 1.25));
            restartIfPlaying();
            return;
        }
        if (event.key === 'Home') {
            event.preventDefault();
            stopPlay();
            gotoFrame(0);
            return;
        }
        if (event.key === 'End') {
            event.preventDefault();
            stopPlay();
            gotoFrame(totalFrames - 1);
            return;
        }
        if (event.key === ' ' || event.code === 'Space') {
            event.preventDefault();
            if (isPlaying) {
                stopPlay();
            } else {
                startPlay();
            }
            return;
        }
    });
})();
